name: QRCode
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    # This block gives the Action permission to push the PNG back to your repo
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # Fetching all history ensures git knows about other branches
        fetch-depth: 0 

    - name: Generate QR Code
      uses: snow-actions/qrcode@v2.0.0
      with:
        text: 'https://github.com/snow-actions/qrcode' # UPDATE THIS to your URL
        path: qrcode.png

    - name: Configure Git User
      uses: snow-actions/git-config-user@v1.0.0

    - name: Commit and Push to qrcode branch
      run: |
        git add qrcode.png
        # The '|| true' prevents the error if there are no changes to commit
        git commit -m "Update QR Code" || true
        git push origin HEAD:qrcode --force

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qrcode-image
        path: qrcode.png