name: QRCode
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Generate QR Code
      uses: snow-actions/qrcode@v2.0.0
      with:
        # UPDATE THIS to your actual project URL
        text: 'https://wscottmd23.github.io/' 
        path: qrcode.png

    - name: Configure Git User
      uses: snow-actions/git-config-user@v1.0.0

    - name: Commit and Push to main
      run: |
        git add qrcode.png
        # Check if there are actual changes to prevent empty commit errors
        if [ -n "$(git status --porcelain)" ]; then
          # '[skip ci]' tells GitHub NOT to run this action again for this commit
          git commit -m "Update QR Code [skip ci]"
          git push origin main
        else
          echo "No changes in QR code detected. Skipping push."
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qrcode-image
        path: qrcode.png