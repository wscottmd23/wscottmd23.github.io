name: QRCode
on:
  push:
    branches: [ main ] # Triggered whenever you push to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      # We removed 'ref: qrcode' here so it starts by looking at your current code

    - name: Generate QR Code
      uses: snow-actions/qrcode@v2.0.0
      with:
        text: 'https://https://github.com/wscottmd23/wscottmd23.github.io/' # UPDATE THIS URL
        path: qrcode.png

    - name: Configure Git User
      uses: snow-actions/git-config-user@v1.0.0

    - name: Commit and Push to qrcode branch
      run: |
        git add qrcode.png
        git commit -m "Update QR Code"
        # This pushes the image to a branch named 'qrcode'
        git push origin HEAD:qrcode --force 

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # Updated from v1 to v4
      with:
        name: qrcode-image
        path: qrcode.png